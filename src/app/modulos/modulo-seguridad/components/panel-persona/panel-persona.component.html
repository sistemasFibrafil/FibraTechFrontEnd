<div class="card card-w-title">
    <h1><strong>{{titulo}}</strong></h1>

    <!-- Filtros -->
    <p-panel header="Opción de busqueda de {{titulo}}" [style]="{'margin-bottom':'20px'}" [toggleable]="true">
        <div class="grid p-fluid">
            <div class="col-12 md:col-6">
                <input type="text" pInputText placeholder="Ingresar ID de usuario o nombre" size="100" [(ngModel)]="filtroFind" (keyup.enter)="onToBuscar()" />
            </div>
            <div class="col-12 md:col-2">
                <button [disabled]="buttonAcces.btnBuscar" pButton type="button" label="{{globalConstants.cBuscar}}" icon="{{globalConstants.icoBuscar}}" (click)="onToBuscar()"></button>
            </div>
            <div class="col-12 md:col-2">
                <button [disabled]="buttonAcces.btnNuevo" pButton type="button" label="{{globalConstants.cNuevo}}" icon="{{globalConstants.icoNuevo}}" (click)="onToCreate()"></button>
            </div>
            <div class="col-12 md:col-2">
                <app-btn-salir [isMargenTop]="false"></app-btn-salir>
            </div>
        </div>
    </p-panel>

    <!-- Grilla de Datos     -->
    <p-panel header="Lista de {{titulo}}" [toggleable]="true">
        <p-table
        [value]="listModelo"
        [columns]="columnas"
        [paginator]="true"
        dataKey="idPersona"
        [responsive]="false"
        [autoLayout]="true"
        [showCurrentPageReport]="true"
        [rows]="globalConstants.sizePage"
        styleClass="{{globalConstants.cStyleTableGridLines}}"
        currentPageReportTemplate="{{globalConstants.currentPageReportTemplate}}">
            <!-- Header -->
            <ng-template pTemplate="header" let-columns>
              <tr>
                <th class="custom-header"></th>
                <th pSortableColumn="{{col.field}}" *ngFor="let col of columns" class="custom-header">
                  <p-sortIcon field="{{col.field}}"></p-sortIcon> {{col.header}}
                </th>
              </tr>
            </ng-template>
            <!-- body -->
            <ng-template pTemplate="body" let-modelo let-editing="editing" let-ri="rowIndex">
            <tr>
              <td class="custom-td-8">
                <p-splitButton icon="pi pi-cog" [model] = "opciones" (onDropdownClick) = "onSelectedItem(modelo)" appendTo = "body">
                </p-splitButton>
              </td>
              <td class="custom-td-10">
                <span class="p-column-title">Usuario</span> {{modelo.usuario}}
              </td>
              <td class="p-fluid">
                <span class="p-column-title">Apellidos y Nombres</span> {{modelo.nombreCompleto}}
              </td>
              <td class="custom-td-12">
                <span class="p-column-title">N° Documento</span> {{modelo.nroDocumento}}
              </td>
              <td class="custom-td-3">
                <span class="p-column-title">Perfil</span> {{modelo.descripcionPerfil}}
              </td>
              <td class="custom-td-checkbox">
                <span class="p-column-title">Activo</span>
                <p-checkbox [(ngModel)]="modelo.activo" [binary]="true" [disabled]="true"></p-checkbox>
              </td>
            </tr>
            </ng-template>
            <ng-template pTemplate="emptymessage">
              <tr>
                <td colspan="7">{{globalConstants.currentTableEmptyMessage}}</td>
              </tr>
            </ng-template>
        </p-table>
        <p-footer>
          <div class="grid p-fluid">
          <div class="col-12 md:col-2">
            <button [disabled]="buttonAcces.btnNuevo" pButton type="button" label="{{globalConstants.cNuevo}}" icon="{{globalConstants.icoNuevo}}" (click)="onToCreate()"></button>
          </div>
          </div>
        </p-footer>
    </p-panel>
</div>


<!-- MODAL: Proceso -->
<app-panel-obtener [isDisplay] = "isDisplay"></app-panel-obtener>
