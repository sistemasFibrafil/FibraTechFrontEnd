<div class="card card-w-title">
    <h1><strong>{{titulo}}</strong></h1>

    <!-- Filtros -->
    <p-panel header="Opción de busqueda de {{titulo}}" [style] = "{'margin-bottom':'20px'}" [toggleable]="true">
      <form [formGroup]="modeloForm">
        <div class="grid p-fluid">
          <div class="col-12 md:col-2">
            <p-calendar formControlName="startDate" placeholder="Seleccionar fecha inicial" [showButtonBar]="true" dateFormat="dd/mm/yy" [showIcon]="true"></p-calendar>
          </div>
          <div class="col-12 md:col-2">
            <p-calendar formControlName="endDate" placeholder="Seleccionar fecha final" [showButtonBar]="true" dateFormat="dd/mm/yy" [showIcon]="true"></p-calendar>
          </div>
          <div class="col-12 md:col-4">
            <p-multiSelect [options]="docStatusList" formControlName="docStatus" defaultLabel="Seleccione el Estado" selectedItemsLabel="{0} regitros seleccionadas"></p-multiSelect>
          </div>
          <div class="col-12 md:col-4">
            <input id="float-input-searchText" type="text" placeholder="Buscar por número" maxlength="100" size="50" formControlName="searchText" autocomplete="off" pInputText (keyup.enter)="onClickBuscar()">
          </div>
        </div>
      </form>

      <p-footer>
        <div class="grid p-fluid">
          <div class="col-12 md:col-4">
            <button [disabled]="buttonAcces.btnBuscar || !modeloForm.valid" pButton type="button" label="{{globalConstants.cBuscar}}" icon="{{globalConstants.icoBuscar}}" (click)="onClickBuscar()"></button>
        </div>
        <div class="col-12 md:col-4">
          <button [disabled]="buttonAcces.btnNuevo" pButton type="button" label="{{globalConstants.cNuevo}}" icon="{{globalConstants.icoNuevo}}" (click)="onClickCreate()"></button>
        </div>
        <div class="col-12 md:col-4">
          <app-btn-salir [isMargenTop]="false"></app-btn-salir>
        </div>
        </div>
      </p-footer>
    </p-panel>



    <!-- Grilla de Datos     -->
    <p-panel header="Lista de {{titulo}}" [toggleable]="true">
        <p-table
          [value]="modelo"
          [columns]="columnas"
          [rows]="rows"
          [rowHover]="true"
          [paginator]="true"
          [autoLayout]="true"
          selectionMode="single"
          [resizableColumns]="true"
          responsiveLayout="scroll"
          [showCurrentPageReport]="true"
          [rowsPerPageOptions]="rowsPerPageOptions"
          styleClass="{{globalConstants.cStyleTableGridLines}}"
          currentPageReportTemplate="{{globalConstants.currentPageReportTemplate}}">
          <!-- Header -->
          <ng-template pTemplate="header" let-columns>
            <tr>
              <th class="custom-header"></th>
              <th pSortableColumn="{{col.field}}" *ngFor = "let col of columns" class = "custom-header">
                <p-sortIcon field="{{col.field}}"></p-sortIcon>
                {{col.header}}
              </th>
            </tr>
          </ng-template>
          <!-- body -->
          <ng-template pTemplate = "body" let-modelo let-editing = "editing" let-ri = "rowIndex">
            <tr [pSelectableRow]="modelo" [ngClass]="{'row-cerrado': modelo?.docStatus === 'C'}">
              <td class="custom-td-8">
                <p-splitButton icon="pi pi-cog" [model] = "opciones" (onDropdownClick) = "onSelectedItem(modelo)" appendTo = "body">
                </p-splitButton>
              </td>
              <td class="p-fluid">
                {{modelo.docNum}}
              </td>
              <td class="custom-td-20">
                <span class="label badge-articulos" *ngIf="modelo?.docType === 'I'">Artículos</span>
                <span class="label badge-servicios" *ngIf="modelo?.docType === 'S'">Servicios</span>
              </td>
              <td class="p-fluid">
                {{modelo.docDate | date: 'dd/MM/yyyy'}}
              </td>
              <td class="p-fluid">
                {{modelo.docDueDate | date: 'dd/MM/yyyy'}}
              </td>
              <td class="p-fluid">
                {{modelo.taxDate | date: 'dd/MM/yyyy'}}
              </td>
              <td class="p-fluid">
                {{modelo.reqDate | date: 'dd/MM/yyyy'}}
              </td>
            </tr>
          </ng-template>
          <ng-template pTemplate="emptymessage">
            <tr>
              <td colspan="9">{{globalConstants.currentTableEmptyMessage}}</td>
            </tr>
          </ng-template>
        </p-table>
    </p-panel>
</div>

<!-- MODAL: Proceso -->
<app-panel-obtener [isDisplay] = "isDisplay"></app-panel-obtener>
<app-panel-cerrar [isClosing] = "isClosing" ></app-panel-cerrar>
